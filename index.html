<!DOCTYPE html>
<html lang="en">
<head>
    <title>Online Exam Simulation</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="topbar">
        <h2><a href="" onclick="location.reload(); return false;" style="color: inherit; text-decoration: none; cursor: pointer;">Online Exam Simulation</a></h2>
        <div id="time-remaining">Time left: </div>
        <div id="timer">00:00</div>
    </div>

    <div class="container">
        <div id="popup">
            <form id="choice" action="#">
                <h2 id="top">Subject</h2>
                <select name="subject" id="subject" form="choice">
                    <option value="math">Mathematics</option>
                    <option value="phy">Physics</option>
                    <option value="chem">Chemistry</option>
                </select>
                <h2>Time</h2>
                <input type="number" id="time" placeholder="Enter time in minutes">
                <button type="button" id="submit" onclick="init()">Start</button>
            </form>
        </div>
        <div class="main">
            <h3 id="question"></h3>
            <img id="img">
            <div id="img-br"></div>
            <div id="options"></div>
            <div id="buttons">
                <button id="prev-btn" onclick="prev()">Previous</button>
                <button id="next-btn" onclick="next()">Next</button>
                <button id="submit-btn" onclick="submit()">Submit Exam</button>
                <button id="mark-btn" onclick="mark()">Mark</button>
            </div>
        </div>

        <div class="sidebar" id="question-nav"></div>
    </div>

    <div id="overlay"></div>

    <div id="end-popup">
        <h2 id="end-popup-title">Exam Complete</h2>
        <div id="end-score-wrap">
            <span id="end-score-label">Your Score</span>
            <div id="end-score"></div>
        </div>
        <div id="results-table-wrap">
            <table id="results-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Question</th>
                        <th>Your Answer</th>
                        <th>Correct Answer</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
        </div>
        <button id="restart-btn" onclick="restart()">Restart</button>
    </div>

    <footer id="foot">
        <p><a href="https://github.com/Speedbird849/exam-interface" target="_blank" id="footer-link">&copy; 2026, Designed by Aryan Gupta. All rights reserved.</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
