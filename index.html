<!DOCTYPE html>
<html lang="en">
<head>
    <title>Online Exam Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="topbar">
        <h2>Online Exam</h2>
        <div id="time-remaining">Time left: </div>
        <div id="timer">15:00</div>
    </div>

    <div class="container">
        <div class="main">
            <h3 id="question"></h3>
            <img id="img">
            <div id="img-br"></div>
            <div id="options"></div>
            <div id="buttons">
                <button id="prev-btn" onclick="prev()">Previous</button>
                <button id="next-btn" onclick="next()">Next</button>
                <button id="submit-btn" onclick="submit()">Submit Exam</button>
                <button id="mark-btn" onclick="mark()">Mark</button>
            </div>
        </div>

        <div class="sidebar" id="question-nav"></div>
    </div>  

    

    <script src="script.js"></script>
</body>
</html>
